# vim:fileencoding=utf-8:ft=conf:foldmethod=marker


# font_family      monospace
# bold_font        auto
# italic_font      auto
# bold_italic_font auto

font_family      RecMonoCasualNerdFontMono
# bold_font        JetBrainsMono Nerd Font Mono, Medium
# italic_font      JetBrainsMono Nerd Font Mono, Book Italic
# bold_italic_font  JetBrainsMono Nerd Font Mono, Medium Italic

font_size 16.0
# adjust_line_height  0
# adjust_column_width 0
# adjust_baseline 0
disable_ligatures never
#:     map alt+1 disable_ligatures_in active always
#:     map alt+2 disable_ligatures_in all never
#:     map alt+3 disable_ligatures_in tab cursor


# font_features none
# font_features FiraCode-Retina +zero +onum
# font_features FiraCode-Retina +zero
# font_features TT2020StyleB-Regular -liga +calt

# box_drawing_scale 0.001, 1, 1.5, 2


# cursor #cccccc
# cursor_text_color #111111
# cursor_shape block
# cursor_beam_thickness 1.5
# cursor_underline_thickness 2.0
# cursor_blink_interval -1
# cursor_stop_blinking_after 15.0

# scrollback_lines 2000
# scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
# scrollback_pager_history_size 0
# scrollback_fill_enlarged_window no
# wheel_scroll_multiplier 5.0
# touch_scroll_multiplier 1.0

# mouse_hide_wait 3.0



#: The color and style for highlighting URLs on mouse-over. url_style
url_color #0087bd
url_style curly # none, single, double, curly
open_url_with default
url_prefixes http https file ftp gemini irc gopher mailto news git
detect_urls yes
# url_excluded_characters

copy_on_select yes
# map ctrl+shift+c copy_from_buffer a1
# map ctrl+shift+v paste_from_buffer a1

# never, always, smart[not when rectangular selection]
strip_trailing_spaces smart

#: Characters considered part of a word when double clicking. In
#: addition to these characters any character that is marked as an
#: alphanumeric character in the unicode database will be matched.
#
# select_by_word_characters @-./_~?&=%+#


#: The interval between successive clicks to detect double/triple
#: clicks (in seconds). Negative numbers will use the system default
#: instead, if available, or fallback to 0.5.
#
# click_interval -1.0


#: Mouse pointers are: arrow, beam, hand
focus_follows_mouse no
ointer_shape_when_grabbed hand
default_pointer_shape beam
pointer_shape_when_dragging beam

#: Performance tuning {{{
repaint_delay 10
input_delay 3
sync_to_monitor yes
#: }}}

#: Terminal bell {{{
enable_audio_bell no
# visual_bell_duration 0.0
window_alert_on_bell yes
# bell_on_tab yes
# command_on_bell none
#: }}}

#: Window layout {{{
# remember_window_size  yes
# initial_window_width  640
# initial_window_height 400
# enabled_layouts *
# window_resize_step_cells 2
# window_resize_step_lines 2
# window_border_width 0.5pt
# draw_minimal_borders yes
# window_margin_width 0
# single_window_margin_width -1
window_padding_width 0 0
placement_strategy center
# active_border_color #00ff00
# inactive_border_color #cccccc
# bell_border_color #ff5a00
# inactive_text_alpha 1.0
hide_window_decorations no
# resize_debounce_time 0.1
# resize_draw_strategy static
# resize_in_steps no
confirm_os_window_close 0
#: }}}

#: Tab bar {{{

tab_bar_edge top
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style powerline
tab_bar_min_tabs 2
# tab_switch_strategy previous
# tab_fade 0.25 0.5 0.75 1
# tab_separator " ┇"
tab_powerline_style slanted
tab_activity_symbol none
# tab_title_template "{fmt.noitalic}t{sup.index}: {fmt.fg.red}{title}{fmt.fg.default}"
tab_title_template "t{sup.index}: {title}"
# active_tab_title_template none
#: tab_title_template.
active_tab_foreground   blue
active_tab_background   #eee
active_tab_font_style   bold-italic
inactive_tab_foreground #444
inactive_tab_background #999
inactive_tab_font_style normal
tab_bar_background      blue
#: }}}

#: Color scheme {{{
foreground #dddddd
background #000000
background_opacity 0.8
background_image none
# background_image_layout tiled
# background_image_linear no
# dynamic_background_opacity no
# background_tint 0.0
# dim_opacity 0.75
# selection_foreground #000000
# selection_background #fffacd
#: }}}

#: The color table {{{

#: black
# color0 #000000
# color8 #767676

#: red
# color1 #cc0403
# color9 #f2201f


#: green
# color2  #19cb00
# color10 #23fd00


#: yellow
# color3  #cecb00
# color11 #fffd00


#: blue
# color4  #0d73cc
# color12 #1a8fff

#: magenta
# color5  #cb1ed1
# color13 #fd28ff


#: cyan
# color6  #0dcdcd
# color14 #14ffff


#: white
# color7  #dddddd
# color15 #ffffff


# mark1_foreground black
# mark1_background #98d3cb
# mark2_foreground black
# mark2_background #f2dcd3
# mark3_foreground black
# mark3_background #f274bc

#: }}}

#: Advanced {{{

# shell .
# editor nvim
# close_on_child_death no
# allow_remote_control no
# listen_on none
#:     env MYVAR1=a
#:     env MYVAR2=${MYVAR1}/${HOME}/b
# env
# update_check_interval 24
# startup_session none
clipboard_control write-clipboard write-primary
allow_hyperlinks yes
# term xterm-kitty
#: }}}

#: OS specific tweaks {{{
# wayland_titlebar_color system
wayland_titlebar_color #12af59
# macos_titlebar_color system
# macos_option_as_alt no
# macos_hide_from_tasks no
# macos_quit_when_last_window_closed no
# macos_window_resizable yes
# macos_thicken_font 0
# macos_traditional_fullscreen no
# macos_show_window_title_in all
# macos_custom_beam_cursor no
# linux_display_server auto
#: }}}

#: Keyboard shortcuts {{{
kitty_mod alt
clear_all_shortcuts yes
# kitten_alias hints hints --hints-offset=0

#: Clipboard {{{

map ctrl+c 	 copy_or_interrupt
map ctrl+shift+c copy_to_clipboard

map ctrl+v       paste_from_clipboard
map ctrl+shift+v paste_from_clipboard

# map kitty_mod+s paste_from_selection
# map kitty_mod+o pass_selection_to_program
#:     map kitty_mod+o pass_selection_to_program firefox
#:     map kitty_mod+y new_window less @selection

#: }}}

#: Scrolling {{{
# map kitty_mod+up        scroll_line_up
# map kitty_mod+down      scroll_line_down
# map kitty_mod+page_up   scroll_page_up
# map kitty_mod+page_down scroll_page_down
# map kitty_mod+home      scroll_home
# map kitty_mod+end       scroll_end
# map kitty_mod+h         show_scrollback
#:     map f1 launch --stdin-source=@screen_scrollback --stdin-add-formatting --type=overlay less +G -R
#: }}}

#: Window management {{{
map alt+n  launch --cwd=current
map alt+y      launch mutt
# map alt+n new_os_window
map alt+ctrl+q close_window
map alt+h next_window
map alt+j next_window
map alt+k previous_window
map alt+l previous_window
map alt+shift+j move_window_forward
map alt+shift+k move_window_backward
# map kitty_mod+` move_window_to_top
# map kitty_mod+r start_resizing_window
# map kitty_mod+1 first_window
# map kitty_mod+2 second_window
# map kitty_mod+3 third_window
# map kitty_mod+4 fourth_window
# map kitty_mod+5 fifth_window
# map kitty_mod+6 sixth_window
# map kitty_mod+7 seventh_window
# map kitty_mod+8 eighth_window
# map kitty_mod+9 ninth_window
# map kitty_mod+0 tenth_window
#: }}}

#: Tab management {{{

map ctrl+page_down    next_tab
map ctrl+page_up  previous_tab
map alt+t           new_tab
map alt+q           close_tab
map shift+cmd+w     close_os_window
map ctrl+shift+page_down     move_tab_forward
map ctrl+shift+page_up     move_tab_backward
#map kitty_mod+alt+t set_tab_title

map alt+7 goto_tab 1
map alt+8 goto_tab 2
map alt+9 goto_tab 3

#: }}}

#: Layout management {{{

# map alt+l next_layout

#: You can also create shortcuts to switch to specific layouts::

# map alt+t goto_layout tall
# map alt+s goto_layout stack
map alt+g last_used_layout
#: }}}

#: Font sizes {{{
map ctrl+plus     change_font_size all +2.0
map ctrl+minus     change_font_size all -2.0
#:     map kitty_mod+f6 change_font_size all 10.0
#:     map kitty_mod+f6 change_font_size current 10.0
#: }}}

#: Select and act on visible text {{{
map alt+e kitten hints

#: Open a currently visible URL using the keyboard. The program used
#: to open the URL is specified in open_url_with.
# map kitty_mod+p>f kitten hints --type path --program -

#: Select a path/filename and insert it into the terminal. Useful, for
#: instance to run git commands on a filename output from a previous
#: git command.
# map kitty_mod+p>shift+f kitten hints --type path

#: Select a path/filename and open it with the default open program.
# map kitty_mod+p>l kitten hints --type line --program -

#: Select a line of text and insert it into the terminal. Use for the
#: output of things like: ls -1
# map kitty_mod+p>w kitten hints --type word --program -

#: Select words and insert into terminal.
map alt+p>h kitten hints --type hash --program -
# map kitty_mod+p>n kitten hints --type linenum
# map kitty_mod+p>y kitten hints --type hyperlink
#: }}}

map f11    toggle_fullscreen
map f10    toggle_maximized
# map kitty_mod+u  kitten unicode_input
map f2     	 edit_config_file
# map kitty_mod+escape kitty_shell window
#:     map kitty_mod+f9 clear_terminal reset active
#:     map kitty_mod+f10 clear_terminal clear active
#:     map kitty_mod+f11 clear_terminal scrollback active
#:     map kitty_mod+f12 clear_terminal scroll active
map f5 load_config_file
#:     map f5 load_config /path/to/alternative/kitty.conf
